<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小陈二号</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff0f5; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #fbeaf0; padding: 16px; text-align: center; border-bottom: 1px solid #f4c0d1; }
        .header-title { color: #72243e; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        #chatbox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: #fff8fb; }
        .msg { display: flex; flex-direction: column; max-width: 75%; }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.bot { align-self: flex-start; align-items: flex-start; }
        .bot-name { font-size: 11px; color: #993556; margin-bottom: 3px; }
        .bubble { padding: 12px 16px; font-size: 15px; line-height: 1.6; }
        .user .bubble { background: #d4537e; color: #fbeaf0; border-radius: 18px 18px 4px 18px; }
        .bot .bubble { background: #fbeaf0; color: #72243e; border: 1px solid #f4c0d1; border-radius: 18px 18px 18px 4px; }
        .inputarea { display: flex; gap: 10px; padding: 16px; background: #fbeaf0; border-top: 1px solid #f4c0d1; }
        #input { flex: 1; background: white; border: 1px solid #f4c0d1; border-radius: 24px; padding: 10px 18px; color: #72243e; font-size: 15px; outline: none; }
        #input::placeholder { color: #f4c0d1; }
        button { background: #d4537e; border: none; border-radius: 24px; padding: 10px 22px; color: white; font-size: 15px; cursor: pointer; }
        button:hover { background: #993556; }
        .deco { text-align: center; padding: 8px; color: #993556; font-size: 12px; background: #fbeaf0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🌸 小陈二号 🌸</div>
    </div>
    <div id="chatbox"></div>
    <div class="inputarea">
        <input id="input" type="text" placeholder="说点什么..." />
        <button onclick="sendMessage()">发送</button>
    </div>
    <div class="deco">🌸 powered by 小陈二号</div>
    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const msg = input.value.trim();
            if (!msg) return;
            addMessage(msg, "user");
            if(msg.includes("陈思怡")){
                floatHearts()
            }
            input.value = "";
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            addMessage(data.reply, "bot");
        }
        function addMessage(text, who) {
            const box = document.getElementById("chatbox");
            const div = document.createElement("div");
            div.className = "msg " + who;
            if (who === "bot") {
                div.innerHTML = `<div class="bot-name">小陈二号</div><div class="bubble">${text}</div>`;
            } else {
                div.innerHTML = `<div class="bubble">${text}</div>`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
function floatHearts(){
    for(let i = 0; i<30; i++){
        setTimeout(()=>{
            const heart =document.createElement("div")
            heart.innerHTML = "❤️"
            heart.style.position = "fixed"
            heart.style.left = Math.random()*100+"vw"
            heart.style.top = "100vh"
            heart.style.fontSize = Math.random()*20+20+"px"
            heart.style.transition ="all 3s ease"
            heart.style.zIndex ="999"
            heart.style.pointerEvents ="none"
            document.body.appendChild(heart)
            setTimeout(()=>{
                heart.style.top ="-10vh"
                heart.style.opacity="0"
            },100)
            setTimeout(()=>{
                heart.remove()
            },3000))
        },i*100)
    }
}
    </script>
</body>
</html>
